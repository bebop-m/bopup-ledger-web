<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <meta name="theme-color" content="#152849">
    <title>&#27874;&#26222;&#36134;&#26412;</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-kicker">Bopup Ledger</p>
          <h1 class="app-title">&#27874;&#26222;&#36134;&#26412;</h1>
        </div>
        <button
          id="privacyButton"
          class="circle-button"
          type="button"
          aria-label="&#38544;&#34255;&#25110;&#26174;&#31034;&#37329;&#39069;"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              class="eye-shell"
              d="M2 12C4.8 7.9 8.2 5.8 12 5.8S19.2 7.9 22 12c-2.8 4.1-6.2 6.2-10 6.2S4.8 16.1 2 12Z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <circle
              class="eye-core"
              cx="12"
              cy="12"
              r="3.15"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
            ></circle>
            <path
              class="eye-slash"
              d="M4 20L20 4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
            ></path>
          </svg>
        </button>
      </header>

      <main class="page-stack">
        <section class="panel">
          <header class="panel-bar panel-bar--spread">
            <div>
              <h2 class="panel-title">&#36164;&#20135;&#24635;&#35272;</h2>
              <p class="panel-note">
                &#20215;&#26684;&#12289;&#32929;&#24687;&#29575;&#12289;&#27719;&#29575;&#25442;&#31639;&#19982;&#24180;&#24230;&#32929;&#24687;
              </p>
            </div>
            <div class="text-actions">
              <button id="exportButton" class="text-button" type="button">
                &#23548;&#20986;&#24555;&#29031;
              </button>
              <button id="importButton" class="text-button" type="button">
                &#23548;&#20837;&#24555;&#29031;
              </button>
            </div>
          </header>
          <div id="summaryGrid" class="summary-grid"></div>
        </section>

        <section class="panel">
          <header class="panel-bar">
            <div>
              <h2 class="panel-title">&#25345;&#20179;&#32467;&#26500;</h2>
              <p class="panel-note">
                &#20844;&#21496;&#21344;&#27604;&#19982;&#26680;&#24515;&#20179; / &#25171;&#24037;&#20179;&#20998;&#24067;
              </p>
            </div>
          </header>
          <div class="chart-shell">
            <div class="chart-layout">
              <div class="legend-wrap">
                <div id="companyLegend" class="legend-list"></div>
                <button
                  id="legendToggle"
                  class="text-button legend-toggle"
                  type="button"
                  hidden
                ></button>
              </div>
            </div>
            <div id="bucketTrack" class="bucket-track"></div>
          </div>
        </section>

        <section class="panel">
          <header class="panel-bar panel-bar--list">
            <div class="list-heading">
              <h2 class="panel-title">&#25345;&#20179;&#21015;&#34920;</h2>
              <p id="marketTimestamp" class="panel-note"></p>
            </div>
            <div class="sort-group">
              <button class="sort-chip" type="button" data-sort-field="marketValueCny"></button>
              <button class="sort-chip" type="button" data-sort-field="effectiveYield"></button>
              <button class="sort-chip" type="button" data-sort-field="netAnnualDividendCny"></button>
            </div>
            <div class="icon-actions">
              <button
                id="refreshButton"
                class="circle-button"
                type="button"
                aria-label="&#21047;&#26032;&#34892;&#24773;"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M18.6 8.4A7.6 7.6 0 1 0 19 15.7"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <path
                    d="M15.2 5.8H20v4.8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </button>
              <button
                id="addButton"
                class="circle-button"
                type="button"
                aria-label="&#26032;&#22686;&#25345;&#20179;"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5.2v13.6M5.2 12h13.6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
            </div>
          </header>
          <div id="stockList" class="stock-list"></div>
        </section>
      </main>
    </div>

    <div id="modalRoot"></div>
    <div id="confirmRoot"></div>
    <div id="toastContainer" class="toast-container"></div>
    <input id="importFileInput" type="file" accept="application/json" hidden>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
